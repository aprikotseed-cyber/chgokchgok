<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 재무 비서</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand">나의 재무 비서</div>
    <div class="tagline">오직 나만을 위한 비공개 자산 기록</div>

    <div class="field">
      <label for="email">이메일</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="username">
    </div>
    <div class="field">
      <label for="password">비밀번호</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" id="loginBtn" style="width:100%; justify-content:center;">로그인</button>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
